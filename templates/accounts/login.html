<!-- login.html  -->

{% extends "base.html" %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to continue your learning journey.
        </p>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Login
            </button>

        </form>

        <div class="auth-footer">

            <p>
                Don't have an account?
                <a href="{% url 'register' %}">
                    Register
                </a>
            </p>

        </div>

    </div>

</div>

{% endblock %}
