{% extends "base.html" %}

{% block title %}
Delete Entry
{% endblock %}

{% block content %}

<h1>Delete Entry</h1>

<p>

Are you sure you want to delete this entry?

</p>

<hr>

<p>

{{ entry.text|linebreaks }}

</p>

<form method="post">

    {% csrf_token %}

    <button type="submit">
        Yes, Delete
    </button>

</form>

<br>

<a href="{% url 'log' log.id %}">
    Cancel
</a>

{% endblock %}
